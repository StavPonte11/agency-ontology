# ── Agency Ontology — Full Infrastructure Stack ──────────────────────────────
# Kafka (KRaft, no ZooKeeper), Neo4j, Elasticsearch, PostgreSQL, MongoDB, Redis
# Observability: LangFuse, OTel, Prometheus, Grafana, Jaeger, GlitchTip

services:

  # ── Kafka (KRaft mode, single broker for dev) ─────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: agency-kafka
    hostname: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_LOG_RETENTION_HOURS: -1        # Infinite retention — replay capability
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: "AgencyOntologyCluster1"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "kafka:29092", "--list" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: agency-kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: agency-ontology
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

  # ── Neo4j (Community Edition 5.18) ───────────────────────────────────────
  neo4j:
    image: neo4j:5.18-community
    container_name: agency-neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/changeme
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_memory_pagecache_size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: [ "CMD", "cypher-shell", "-u", "neo4j", "-p", "changeme", "RETURN 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Elasticsearch 8.13 ────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: agency-elasticsearch
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false       # Disable for dev; enable + TLS for prod
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - cluster.name=agency-ontology
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9200/_cluster/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────
  postgres:
    image: docker.io/postgres:15
    container_name: agency-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: agency_ontology
      POSTGRES_USER: agency
      POSTGRES_PASSWORD: changeme
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U agency -d agency_ontology" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB 7 ─────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: agency-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: agency
      MONGO_INITDB_ROOT_PASSWORD: changeme
      MONGO_INITDB_DATABASE: agency_ontology
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Redis 7.4 ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: agency-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --save 60 1
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── ClickHouse (required by Langfuse v3) ─────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: agency-clickhouse
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native TCP interface
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - langfuse_clickhouse_data:/var/lib/clickhouse
      - langfuse_clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8123/ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── LangFuse v3 Web (self-hosted) ─────────────────────────────────────────
  langfuse-web:
    image: langfuse/langfuse:3
    container_name: agency-langfuse-web
    ports:
      - "3001:3000"
    environment: &langfuse-env
      DATABASE_URL: postgresql://agency:changeme@postgres:5432/langfuse
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_CLUSTER_ENABLED: "false"   # CRITICAL: Disable ZooKeeper requirement
      NEXTAUTH_SECRET: changeme-langfuse-secret-replace-in-prod
      NEXTAUTH_URL: http://localhost:3001
      SALT: changeme-langfuse-salt-replace-in-prod
      ENCRYPTION_KEY: a6d2e7f8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
      # S3/Minio integration for large event storage
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      # Redis for caching/rate limiting
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Initialization
      LANGFUSE_INIT_ORG_ID: agency-org
      LANGFUSE_INIT_PROJECT_ID: agency-pipeline
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-pk-lf-agency-dev}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-sk-lf-agency-dev}
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:3000/api/public/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── LangFuse v3 Worker (processes async background jobs) ──────────────────
  langfuse-worker:
    image: langfuse/langfuse-worker:3
    container_name: agency-langfuse-worker
    environment:
      <<: *langfuse-env
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # ── MinIO (S3 compatible storage for Langfuse) ───────────────────────────
  minio:
    image: minio/minio:latest
    container_name: agency-minio
    ports:
      - "9005:9000"   # API moved from 9090 to avoid Prometheus conflict
      - "9001:9001"   # Console
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    volumes:
      - langfuse_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── OpenTelemetry Collector ────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: agency-otel
    volumes:
      - ./otel/collector.yml:/etc/otel-collector-config.yaml:ro
    command: [ "--config=/etc/otel-collector-config.yaml" ]
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Prometheus metrics (self)
      - "8889:8889"   # Prometheus exporter
    networks:
      - default

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: agency-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: agency-grafana
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: changeme
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus

  # ── Jaeger (distributed tracing UI) ──────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: agency-jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      - "14268:14268"   # HTTP collector
      - "6831:6831/udp" # UDP compact thrift
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  # ── GlitchTip (error tracking, Sentry-compatible) ─────────────────────────
  # glitchtip:
  #   image: glitchtip/glitchtip:latest
  #   container_name: agency-glitchtip
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     DATABASE_URL: postgresql://agency:changeme@postgres:5432/glitchtip
  #     SECRET_KEY: changeme-glitchtip-secret-replace-in-prod
  #     GLITCHTIP_DOMAIN: http://localhost:8000
  #     DEFAULT_FROM_EMAIL: noreply@agency.internal
  #     EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
  #   depends_on:
  #     postgres:
  #       condition: service_healthy

  # ── Ollama (local LLM) ─────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: agency-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Pipeline workers (Python) ─────────────────────────────────────────────
  pipeline-worker:
    build:
      context: ../services/pipeline
      dockerfile: Dockerfile
    container_name: agency-pipeline-worker
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: changeme
      POSTGRES_URL: postgresql://agency:changeme@postgres:5432/agency_ontology
      MONGODB_URL: mongodb://agency:changeme@mongodb:27017/agency_ontology
      REDIS_URL: redis://redis:6379/0
      ELASTICSEARCH_URL: http://elasticsearch:9200
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-http://host.docker.internal:11434}
      OPENAI_MODEL: ${OPENAI_MODEL:-llama3.3:70b}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-mxbai-embed-large}
      LANGFUSE_HOST: http://langfuse-web:3000
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-placeholder}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-placeholder}
    depends_on:
      kafka:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - pipeline  # Only start with --profile pipeline

  # ── Retrieval API (FastAPI) ───────────────────────────────────────────────
  retrieval_api:
    build:
      context: ../services/retrieval_api
      dockerfile: Dockerfile
    container_name: agency-retrieval_api
    ports:
      - "8080:8080"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: changeme
      ELASTICSEARCH_URL: http://elasticsearch:9200
      REDIS_URL: redis://redis:6379/1
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      POSTGRES_URL: postgresql://agency:changeme@postgres:5432/agency_ontology
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-http://host.docker.internal:11434}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-mxbai-embed-large}
      LANGFUSE_HOST: http://langfuse-web:3000
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-placeholder}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-placeholder}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    depends_on:
      neo4j:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - api  # Only start with --profile api

networks:
  default:
    name: agency-network

volumes:
  kafka_data:
  neo4j_data:
  neo4j_logs:
  elasticsearch_data:
  postgres_data:
  mongodb_data:
  redis_data:
  prometheus_data:
  grafana_data:
  clickhouse_data:
  ollama_data:
  langfuse_minio_data:
    driver: local
  langfuse_clickhouse_data:
    driver: local
  langfuse_clickhouse_logs:
    driver: local