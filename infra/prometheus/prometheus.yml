global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: agency-ontology
    env: dev

scrape_configs:
  # OTel Collector (proxies metrics from Python services)
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  # Retrieval API
  - job_name: retrieval_api
    static_configs:
      - targets: ["retrieval_api:8080"]
    metrics_path: /metrics

  # Pipeline workers
  - job_name: pipeline-worker
    static_configs:
      - targets: ["pipeline-worker:9100"]
    metrics_path: /metrics

  # Kafka metrics (via JMX exporter or kafka-lag-exporter)
  - job_name: kafka
    static_configs:
      - targets: ["kafka:7071"]
    scrape_interval: 30s

  # Elasticsearch
  - job_name: elasticsearch
    static_configs:
      - targets: ["elasticsearch:9200"]
    metrics_path: /_prometheus/metrics
    scrape_interval: 30s

  # Neo4j
  - job_name: neo4j
    static_configs:
      - targets: ["neo4j:2004"]
    scrape_interval: 30s

  # Redis
  - job_name: redis
    static_configs:
      - targets: ["redis:9121"]
    scrape_interval: 15s

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

alerting:
  alertmanagers: []

rule_files: []
