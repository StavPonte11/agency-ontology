[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
testpaths = tests
pythonpath = .
addopts = -v --tb=short
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s %(levelname)-8s %(name)s — %(message)s
markers =
    integration: marks tests as integration tests requiring live APIs and Neo4j
    impact: marks tests for the impact analysis module
# NOTE: env block sets FALLBACK defaults only — .env values take priority
# Do NOT put OPENAI_BASE_URL here (it would override the real OpenAI endpoint)
env =
    NEO4J_URI=bolt://localhost:7687
    NEO4J_USER=neo4j
    NEO4J_PASSWORD=changeme
    ELASTICSEARCH_URL=http://localhost:9200
    REDIS_URL=redis://localhost:6379
    EMBEDDING_MODEL=mxbai-embed-large
