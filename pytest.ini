[pytest]
asyncio_mode = auto
testpaths = tests
pythonpath = .
addopts = -v --tb=short
env =
    NEO4J_URI=bolt://localhost:7687
    NEO4J_USER=neo4j
    NEO4J_PASSWORD=password
    ELASTICSEARCH_URL=http://localhost:9200
    REDIS_URL=redis://localhost:6379
    OPENAI_BASE_URL=http://localhost:11434
    EMBEDDING_MODEL=mxbai-embed-large
